spring.application.name=optics-app

# SQLite
spring.datasource.url=jdbc:sqlite:optics_db.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.connection.date_string_format=yyyy-MM-dd HH:mm:ss


# Enable SQLite foreign keys
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON;

# Temporary login
spring.security.user.name=admin
spring.security.user.password=admin





