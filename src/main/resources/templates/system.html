<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Система</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="content">

    <h1>Система</h1>

    <div class="card-grid">

        <div class="card">
            <h3>Архивиране</h3>
            <p>Създаване на резервно копие на базата данни.</p>
            <button class="btn-primary">Архивирай</button>
        </div>

        <div class="card">
            <h3>Възстановяване</h3>
            <p>Възстановяване от архивен файл.</p>
            <button class="btn-primary">Възстанови</button>
        </div>

        <div class="card">
            <h3>Информация</h3>
            <p>Версия и информация за програмата.</p>
            <button class="btn-primary">Отвори</button>
        </div>

        <div class="card">
            <h3>Помощ</h3>
            <p>Ръководство за работа със системата.</p>
            <button class="btn-primary">Отвори</button>
        </div>

    </div>

</div>

</body>
</html>
