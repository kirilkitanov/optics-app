<!DOCTYPE html>
<html lang="bg" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Списък поръчки</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-wrapper">
    <div th:replace="~{header :: header-fragment}"></div>

    <div class="main-container">
        <div th:replace="~{sidebar :: sidebar-fragment}"></div>

        <section class="content">
            <div class="content-header">
                <h1 class="page-title-blue">Всички поръчки</h1>
                <a th:href="@{/orders/new}" class="btn-new-order">+ Нова поръчка</a>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                    <tr>
                        <th>Номер поръчка</th>
                        <th>Клиент</th>
                        <th>Дата</th>
                        <th>Сума</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.orderNumber}" style="font-weight: bold;"></td>
                        <td th:text="${order.customer.fullName}"></td>
                        <td th:text="${#temporals.format(order.createdOn, 'dd.MM.yyyy HH:mm')}"></td>                        <
                        <td th:text="${#numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT') + ' EUR.'}"></td>
                        <td>
                            <
                            <form th:action="@{/orders/{id}/update-status(id=${order.id})}" method="POST" style="margin:0;">
                                <select name="status" class="status-select" onchange="this.form.submit()" style="padding: 4px 8px;">
                                    <option th:each="statusOpt : ${T(com.opticsappbg.opticsapp.order.model.OrderStatus).values()}"
                                            th:value="${statusOpt}"
                                            th:text="${statusOpt.displayName}"
                                            th:selected="${statusOpt == order.status}">
                                    </option>
                                </select>
                            </form>
                        </td>
                        <td>
                            <div style="display: flex; gap: 8px;">

                                <a th:href="@{/orders/{id}/edit(id=${order.id})}" class="btn-new-order" style="padding: 4px 10px; font-size: 13px; text-decoration: none;">
                                    Редакция
                                </a>


                                <form th:action="@{/orders/{id}/delete(id=${order.id})}" method="POST"
                                      th:onsubmit="return confirm('Сигурни ли сте, че искате да изтриете поръчка ' + [[${order.orderNumber}]] + '?');" style="margin:0;">
                                    <button type="submit" class="btn-open" style="padding: 4px 10px; font-size: 13px; background-color: #dc3545;">
                                        Изтрий
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="6" style="text-align: center; padding: 20px; color: #666;">Няма намерени поръчки.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</div>

</body>
</html>
