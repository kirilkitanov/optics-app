<!DOCTYPE html>
<html lang="bg" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нова поръчка</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta th:name="_csrf" th:content="${_csrf.token}"/>
    <meta th:name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<div class="app-wrapper">

    <div th:replace="~{header :: header-fragment}"></div>

    <div class="main-container">

        <div th:replace="~{sidebar :: sidebar-fragment}"></div>

        <section class="content">

            <div class="content-header">
                <h1 class="page-title-blue">Нова поръчка</h1>
                <a th:href="@{/orders}" class="btn-new-order">Назад</a>
            </div>

            <div class="table-container">

                <form th:action="@{/orders/new}" method="POST">
                    <!-- CLIENT -->
                    <div class="form-group">
                        <label class="form-label">Клиент *</label>

                        <div style="display:flex; gap:10px; align-items:center;">

                            <select id="customerSelect" name="customerId" class="status-select" required>
                                <option value="">-- Избери клиент --</option>

                                <option th:each="c : ${customers}"
                                        th:value="${c.id}"
                                        th:text="${c.fullName + ' - ' + c.phone}">
                                </option>
                            </select>

                            <button type="button" class="btn-new-order" onclick="openCustomerModal()">
                                + Нов
                            </button>

                        </div>
                    </div>

                    <h3 class="section-title">Спецификация</h3>

                    <table id="prescriptionTable">

                        <thead>
                        <tr>
                            <th>Категория</th>
                            <th>Око</th>
                            <th>Баркод</th>
                            <th>Бранд</th>
                            <th>Модел</th>
                            <th>Диаметър/Размер</th>
                            <th>SPH</th>
                            <th>CYL</th>
                            <th>ADD</th>
                            <th>PRISM</th>
                            <th>AXIS</th>
                            <th>BASE</th>
                            <th>К-во</th>
                            <th>Цена</th>
                            <th></th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr class="item-row">
                            <!-- CATEGORY -->
                            <td>
                                <select name="items[0].category" class="status-select category-trigger" onchange="toggleFieldsByCategory(this)">
                                    <option value="LENS">Стъкла</option>
                                    <option value="FRAME">Рамка</option>
                                    <option value="SUNGLASSES">Слънчеви</option>
                                    <option value="CONTACT_LENS">Контактни лещи</option>
                                    <option value="ACCESSORY">Аксесоар</option>
                                </select>
                            </td>
                            <!-- EYE -->
                            <td class="diopter-field">
                                <select name="items[0].eyeSide" class="status-select">
                                    <option value="NONE">--</option>
                                    <option value="LEFT">Ляво</option>
                                    <option value="RIGHT">Дясно</option>
                                </select>
                            </td>
                            <!-- BARCODE -->
                            <td>
                                <input type="text" name="items[0].barcode" class="status-select" placeholder="Сканирай">
                            </td>
                            <!-- BRAND -->
                            <td>
                                <input type="text" name="items[0].brand" class="status-select" list="brandSuggestions">
                            </td>
                            <!-- MODEL -->
                            <td>
                                <input type="text" name="items[0].model" class="status-select" list="modelSuggestions">
                            </td>
                            <!-- SIZE -->
                            <td>
                                <input type="text" name="items[0].sizeOrDiameter" class="status-select">
                            </td>
                            <!-- SPH -->
                            <td class="diopter-field"><input type="number" step="0.25" name="items[0].sph" class="status-select"></td>
                            <!-- CYL -->
                            <td class="diopter-field"><input type="number" step="0.25" name="items[0].cyl" class="status-select"></td>
                            <!-- ADD -->
                            <td class="diopter-field"><input type="number" step="0.25" name="items[0].addPower" class="status-select"></td>
                            <!-- PRISM -->
                            <td class="diopter-field"><input type="number" step="0.1" name="items[0].prism" class="status-select"></td>
                            <!-- AXIS -->
                            <td class="diopter-field"><input type="number" name="items[0].axis" class="status-select" oninput="makeAxisCyclic(this)"></td>
                            <!-- BASE -->
                            <td class="diopter-field"><input type="text" name="items[0].prismBase" class="status-select"></td>
                            <!-- QTY -->
                            <td><input type="number" name="items[0].quantity" value="1" class="status-select"></td>
                            <!-- PRICE -->
                            <td><input type="number" step="0.01" name="items[0].priceAtPurchase" class="status-select"></td>

                            <td>
                                <button type="button" onclick="removeRow(this)" class="btn-open">X</button>
                            </td>

                        </tr>
                        </tbody>

                    </table>
                    <!-- DATALISTS -->
                    <datalist id="brandSuggestions">
                        <option th:each="p : ${products}" th:value="${p.brand}"></option>
                    </datalist>

                    <datalist id="modelSuggestions">
                        <option th:each="p : ${products}" th:value="${p.model}"></option>
                    </datalist>

                    <button type="button" id="addRowBtn" class="btn-new-order">Добави ред</button>
                    <!-- TOTALS -->
                    <div class="financial-box">

                        <div class="financial-group">
                            <label>Общо</label>
                            <input type="number" step="0.01" name="totalBeforeDiscount" readonly value="0">
                        </div>

                        <div class="financial-group">
                            <label>Отстъпка %</label>
                            <input type="number" step="0.01" name="discountPercentage" value="0">
                        </div>

                        <div class="financial-group">
                            <label>Крайна сума</label>
                            <input type="number" step="0.01" name="total">
                        </div>

                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-new-order">Запази</button>
                    </div>

                </form>

            </div>

        </section>
    </div>
</div>

<script>
    document.getElementById('addRowBtn').addEventListener('click', function () {
        let tbody = document.querySelector('#prescriptionTable tbody');
        let rows = tbody.querySelectorAll('.item-row');
        let index = rows.length;

        let newRow = rows[0].cloneNode(true);

        newRow.querySelectorAll('input, select').forEach(el => {
            if (el.name) {
                let field = el.name.split('.').pop();
                el.name = `items[${index}].${field}`;
            }

            if (el.tagName === 'INPUT') { // Корекция: проверка дали полето е за количество, за да не е 0
                if (el.name.endsWith('.quantity')) {
                    el.value = '1';
                } else {
                    el.value = ''; // Текстовите полета, цената и диоптрите остават празни
                }
            }

            if (el.tagName === 'SELECT') {
                el.selectedIndex = 0;
            }
        });

        tbody.appendChild(newRow);
        // Премахваме hidden-field класа, ако първият ред е бил скрит преди клонирането
        newRow.querySelectorAll('.diopter-field').forEach(field => field.classList.remove('hidden-field'));

        toggleFieldsByCategory(newRow.querySelector('.category-trigger'));
        recalcBaseTotal();
    });

    function removeRow(btn) {
        let tbody = document.querySelector('#prescriptionTable tbody');
        let rows = tbody.querySelectorAll('.item-row');

        if (rows.length > 1) {
            btn.closest('tr').remove();
            // Преиндексиране на останалите редове
            tbody.querySelectorAll('.item-row').forEach((row, i) => {
                row.querySelectorAll('input, select').forEach(el => {
                    if (el.name) {
                        let field = el.name.split('.').pop();
                        el.name = `items[${i}].${field}`;
                    }
                });
            });
            recalcBaseTotal();
        } else {
            alert('Формата трябва да съдържа поне един ред!');
        }
    }
</script>

<script>
    function getBaseTotal() {
        return parseFloat(document.querySelector('input[name="totalBeforeDiscount"]').value || 0);
    }

    function setTotal(value) {
        document.querySelector('input[name="total"]').value = value.toFixed(2);
    }

    function setDiscount(value) {
        document.querySelector('input[name="discountPercentage"]').value = value.toFixed(2);
    }
    // При промяна на % отстъпка -> изчислява Крайна сума
    document.querySelector('input[name="discountPercentage"]').addEventListener('input', function () {
        const base = getBaseTotal();
        const discount = parseFloat(this.value || 0);
        const total = base - (base * discount / 100);
        setTotal(total);
    });
    // При промяна на Крайна сума -> изчислява % отстъпка
    document.querySelector('input[name="total"]').addEventListener('input', function () {
        const base = getBaseTotal();
        const total = parseFloat(this.value || 0);

        if (base <= 0) {
            setDiscount(0);
            return;
        }

        const discount = ((base - total) / base) * 100;
        setDiscount(discount);
    });
    // Основна функция за преизчисляване на Общата сума
    function recalcBaseTotal() {
        let rows = document.querySelectorAll('.item-row');
        let baseTotal = 0;

        rows.forEach(row => {
            let qty = parseFloat(row.querySelector('input[name$=".quantity"]')?.value || 0);
            let price = parseFloat(row.querySelector('input[name$=".priceAtPurchase"]')?.value || 0);
            baseTotal += qty * price;
        });
        // Записваме сумата преди отстъпка
        document.querySelector('input[name="totalBeforeDiscount"]').value = baseTotal.toFixed(2);
        // Фикс против безкраен цикъл: Взимаме текущия процент и преизчисляваме директно
        const currentDiscount = parseFloat(document.querySelector('input[name="discountPercentage"]').value || 0);
        const finalTotal = baseTotal - (baseTotal * currentDiscount / 100);

        setTotal(finalTotal);

        return baseTotal;
    }
    // Слушател за промени в количествата и цените по редовете
    document.addEventListener("input", function (e) {
        if (
            e.target.name?.includes("quantity") ||
            e.target.name?.includes("priceAtPurchase")
        ) {
            recalcBaseTotal();
        }
    });
</script>

<div id="customerModal" class="modal" style="display:none;">
    <div class="modal-content">

        <h3>Нов клиент</h3>

        <label>Име</label>
        <input type="text" id="newCustomerName" class="status-select">

        <label>Телефон</label>
        <input type="text" id="newCustomerPhone" class="status-select">

        <div style="margin-top:15px; display:flex; gap:10px;">
            <button type="button" class="btn-new-order" onclick="saveCustomer()">Запази</button>
            <button type="button" class="btn-open" onclick="closeCustomerModal()">Отказ</button>
        </div>

    </div>
</div>

<script>
    function openCustomerModal() {
        document.getElementById("customerModal").style.display = "flex";
    }

    function closeCustomerModal() {
        document.getElementById("customerModal").style.display = "none";
    }
</script>

<script>
    function saveCustomer() {
        const name = document.getElementById("newCustomerName").value.trim();
        const phone = document.getElementById("newCustomerPhone").value.trim();

        if (!name || !phone) {
            alert("Моля, попълнете име и телефон!");
            return;
        }
        // 1. Извличане на CSRF токените от мета таговете на страницата
        const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
        const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

        fetch("/customers/quick-create", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                [header]: token // 2. Изпращане на CSRF токена към сървъра
            },
            body: JSON.stringify({
                name: name,
                phoneNumber: phone
            })
        })
            .then(res => {
                if (!res.ok) {
                    throw new Error("Сървърът отхвърли заявката със статус: " + res.status);
                }
                return res.json();
            })
            .then(data => {
                const select = document.getElementById("customerSelect");
                const option = document.createElement("option");
                option.value = data.id;
                option.text = data.name + " - " + data.phoneNumber;

                select.appendChild(option);
                select.value = data.id;
                // 3. Сега вече полетата ще се изчистят успешно
                document.getElementById("newCustomerName").value = "";
                document.getElementById("newCustomerPhone").value = "";

                closeCustomerModal();
            })
            .catch(err => {
                console.error(err);
                alert("Възникна грешка при записването на клиента.");
            });
    }
</script>

<script>
    function toggleFieldsByCategory(selectElement) {
        // Намираме текущия ред (tr), в който се намира промененото падащо меню
        const row = selectElement.closest('.item-row');
        const selectedValue = selectElement.value;
        // Намираме всички диоптрични колони в този конкретен ред
        const diopterFields = row.querySelectorAll('.diopter-field');
        // Ако избраната категория е "Стъкла" или "Контактни лещи" -> показваме полетата
        if (selectedValue === 'LENS' || selectedValue === 'CONTACT_LENS') {
            diopterFields.forEach(field => field.classList.remove('hidden-field'));
        } else {
            // За всички останали категории (Рамка, Слънчеви, Аксесоар) -> скриваме полетата
            diopterFields.forEach(field => field.classList.add('hidden-field'));
        }
    }
    // Подсигуряваме се, че при първоначално зареждане на страницата логиката ще се изпълни
    document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll('.category-trigger').forEach(select => {
            toggleFieldsByCategory(select);
        });
    });
</script>

<script>
function makeAxisCyclic(input) {
let value = parseInt(input.value);

if (isNaN(value)) return;

if (value > 180) {
input.value = 0;
}

else if (value < 0) {
input.value = 180;
}
}
</script>

</body>
</html>
